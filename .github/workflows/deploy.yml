name: Build and deploy web

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ github.ref == 'refs/heads/main' && secrets.VITE_API_BASE_URL_PROD || secrets.VITE_API_BASE_URL_PREPROD }}

      - name: Upload static build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist

  deploy-preprod:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop' && secrets.O2SWITCH_HOST != ''
    runs-on: ubuntu-latest
    environment: preproduction
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.O2SWITCH_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.O2SWITCH_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy preproduction
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519" ./dist/ "${{ secrets.O2SWITCH_USER }}@${{ secrets.O2SWITCH_HOST }}:${{ secrets.O2SWITCH_TARGET_PATH_PREPROD }}"

  deploy-production:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.O2SWITCH_HOST != ''
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.O2SWITCH_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.O2SWITCH_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy production
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519" ./dist/ "${{ secrets.O2SWITCH_USER }}@${{ secrets.O2SWITCH_HOST }}:${{ secrets.O2SWITCH_TARGET_PATH_PROD }}"

