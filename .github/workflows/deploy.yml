name: Build and deploy web

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ github.ref == 'refs/heads/main' && secrets.VITE_API_BASE_URL_PROD || secrets.VITE_API_BASE_URL_PREPROD }}
          VITE_DEPLOY_BASE: ${{ github.ref == 'refs/heads/main' && '/projet_annuel/prod/' || '/projet_annuel/pre_prod/' }}
      - name: Upload static build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist

  deploy-preprod:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: preproduction
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist
      - name: Deploy preproduction via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER_PREPROD }}
          password: ${{ secrets.FTP_PASSWORD_PREPROD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ./
          security: strict
          timeout: 120000

  deploy-production:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist
      - name: Deploy production via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER_PROD }}
          password: ${{ secrets.FTP_PASSWORD_PROD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ./
          security: strict
          timeout: 120000

