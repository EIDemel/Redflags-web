name: Build and deploy web

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ github.ref == 'refs/heads/main' && secrets.VITE_API_BASE_URL_PROD || secrets.VITE_API_BASE_URL_PREPROD }}

      - name: Upload static build
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist

  deploy-preprod:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: preproduction
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist
      - name: Configure SSH
        env:
          O2SWITCH_HOST: ${{ secrets.O2SWITCH_HOST }}
          O2SWITCH_SSH_KEY: ${{ secrets.O2SWITCH_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$O2SWITCH_HOST" || { echo "::error::Le secret O2SWITCH_HOST est manquant."; exit 1; }
          test -n "$O2SWITCH_SSH_KEY" || { echo "::error::Le secret O2SWITCH_SSH_KEY est manquant."; exit 1; }
          install -d -m 700 ~/.ssh
          printf '%s\n' "$O2SWITCH_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if ! ssh-keyscan -T 10 -H "$O2SWITCH_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "::error::Impossible de joindre $O2SWITCH_HOST en SSH (port 22). Vérifiez l’accès SSH O2Switch et le nom d’hôte."
            exit 1
          fi
      - name: Deploy preproduction
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519" ./dist/ "${{ secrets.O2SWITCH_USER }}@${{ secrets.O2SWITCH_HOST }}:${{ secrets.O2SWITCH_TARGET_PATH_PREPROD }}"

  deploy-production:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.O2SWITCH_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.O2SWITCH_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy production
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_ed25519" ./dist/ "${{ secrets.O2SWITCH_USER }}@${{ secrets.O2SWITCH_HOST }}:${{ secrets.O2SWITCH_TARGET_PATH_PROD }}"

